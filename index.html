<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>黄奕姝的学习小天地</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f4ff}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:#fff;position:relative;overflow:hidden}
.hdr{display:flex;align-items:center;padding:12px 16px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;flex-shrink:0;min-height:56px}
.hdr .back{font-size:24px;cursor:pointer;padding:4px 8px 4px 0;line-height:1}
.hdr .title{font-size:18px;font-weight:700;flex:1;text-align:center;margin-right:30px}
.hdr .badge{background:rgba(255,255,255,.25);border-radius:20px;padding:4px 12px;font-size:13px;font-weight:600}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px 24px}
.screen-center{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.home-hero{padding:30px 0 20px;text-align:center}
.home-emoji{font-size:72px;line-height:1.2;margin-bottom:8px}
.home-title{font-size:28px;font-weight:800;color:#2d3748;margin-bottom:6px}
.home-sub{font-size:15px;color:#718096;margin-bottom:28px}
.home-stats{display:flex;gap:12px;justify-content:center;margin-bottom:32px}
.stat-box{background:#f7fafc;border-radius:16px;padding:14px 20px;text-align:center;min-width:100px;cursor:pointer;transition:transform .12s,box-shadow .12s}
.stat-box:active{transform:scale(.95);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.stat-num{font-size:28px;font-weight:800;color:#667eea}
.stat-label{font-size:12px;color:#a0aec0;margin-top:2px}
.home-btns{display:flex;flex-direction:column;gap:14px;padding:0 12px}
.btn-main{display:flex;align-items:center;gap:14px;padding:18px 22px;border-radius:20px;border:none;font-size:18px;font-weight:700;cursor:pointer;transition:transform .15s}
.btn-main:active{transform:scale(.97)}
.tb-tab-bar{display:flex;gap:6px;margin-bottom:16px}
.tb-tab{flex:1;padding:12px 0;text-align:center;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;border:2px solid transparent}
.tb-tab.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;box-shadow:0 4px 12px rgba(102,126,234,.3)}
.tb-tab:not(.active){background:#fff;color:#667eea;border-color:#e2e8f0}
.btn-textbook{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;box-shadow:0 4px 15px rgba(102,126,234,.4)}
.btn-wrong{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;box-shadow:0 4px 15px rgba(245,87,108,.3)}
.btn-test{background:linear-gradient(135deg,#38b2ac,#2d9cdb);color:#fff;box-shadow:0 4px 15px rgba(56,178,172,.35)}
.btn-danao{background:linear-gradient(135deg,#f39c12,#e67e22);color:#fff;box-shadow:0 4px 15px rgba(243,156,18,.35)}
.btn-my-stories{background:linear-gradient(135deg,#e056a0,#f093fb);color:#fff;box-shadow:0 4px 15px rgba(224,86,160,.35)}
.main-tabs{display:flex;gap:6px;margin-bottom:18px;background:#fff;border-radius:16px;padding:6px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.main-tab{flex:1;padding:12px 0;text-align:center;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;transition:all .25s;border:none;background:transparent;color:#a0aec0}
.main-tab.active-literacy{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;box-shadow:0 4px 12px rgba(102,126,234,.3)}
.main-tab.active-math{background:linear-gradient(135deg,#38b2ac,#319795);color:#fff;box-shadow:0 4px 12px rgba(56,178,172,.3)}
.main-tab.active-english{background:linear-gradient(135deg,#ed8936,#dd6b20);color:#fff;box-shadow:0 4px 12px rgba(237,137,54,.3)}
.math-problem{background:#fff;border-radius:20px;padding:24px;text-align:center;margin-bottom:16px;box-shadow:0 2px 16px rgba(0,0,0,.07)}
.math-problem .mp-expr{font-size:48px;font-weight:900;color:#2d3748;letter-spacing:4px;margin:16px 0}
.math-problem .mp-expr .mp-q{color:#38b2ac;font-size:56px}
.math-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.math-opt{padding:16px;border-radius:16px;font-size:28px;font-weight:800;text-align:center;cursor:pointer;border:3px solid #e2e8f0;background:#fff;color:#2d3748;transition:all .2s}
.math-opt:active{transform:scale(.95)}
.math-opt.correct{border-color:#38a169;background:#f0fff4;color:#38a169;animation:pop .3s}
.math-opt.wrong-opt{border-color:#e53e3e;background:#fff5f5;color:#e53e3e;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.math-score-bar{display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:14px;padding:12px 16px;margin-bottom:12px;box-shadow:0 1px 8px rgba(0,0,0,.05)}
.math-score-bar .ms-item{text-align:center}
.math-score-bar .ms-num{font-size:24px;font-weight:800}
.math-score-bar .ms-label{font-size:11px;color:#a0aec0}
.btn-math-add{background:linear-gradient(135deg,#38b2ac,#319795);color:#fff;box-shadow:0 4px 15px rgba(56,178,172,.35)}
.btn-math-chain{background:linear-gradient(135deg,#e53e3e,#c53030);color:#fff;box-shadow:0 4px 15px rgba(229,62,62,.35)}
.btn-math-mix{background:linear-gradient(135deg,#805ad5,#6b46c1);color:#fff;box-shadow:0 4px 15px rgba(128,90,213,.35)}
.btn-eng-abc{background:linear-gradient(135deg,#ed8936,#dd6b20);color:#fff;box-shadow:0 4px 15px rgba(237,137,54,.35)}
.btn-eng-words{background:linear-gradient(135deg,#f6ad55,#ed8936);color:#fff;box-shadow:0 4px 15px rgba(246,173,85,.35)}
.story-card{background:#fff;border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:0 2px 16px rgba(0,0,0,.07);position:relative;overflow:hidden}
.story-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px}
.story-card.s-pink::before{background:linear-gradient(180deg,#f093fb,#f5576c)}
.story-card.s-blue::before{background:linear-gradient(180deg,#667eea,#764ba2)}
.story-card.s-green::before{background:linear-gradient(180deg,#38a169,#68d391)}
.story-card.s-orange::before{background:linear-gradient(180deg,#ed8936,#f6ad55)}
.story-card.s-purple::before{background:linear-gradient(180deg,#9f7aea,#b794f4)}
.story-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.story-head .s-emoji{font-size:32px}
.story-head .s-title{font-size:17px;font-weight:800;color:#2d3748}
.story-head .s-badge{font-size:11px;background:#edf2f7;color:#718096;padding:2px 8px;border-radius:10px;margin-left:auto}
.story-body{font-size:16px;line-height:2.2;color:#4a5568;text-indent:2em}
.story-body .shl{color:#e056a0;font-weight:700;background:#fdf2f8;padding:1px 3px;border-radius:4px}
.story-chars{margin-top:12px;padding-top:10px;border-top:1px dashed #e2e8f0}
.story-chars .sc-label{font-size:11px;color:#a0aec0;margin-bottom:4px}
.story-chars .sc-list{font-size:14px;color:#e056a0;letter-spacing:1px;line-height:1.8}
.theme-group{margin-bottom:16px}
.theme-tag{display:inline-block;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:700;color:#fff;margin-bottom:8px}
.sent-card{background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 8px rgba(0,0,0,.05);display:flex;align-items:flex-start;gap:10px}
.sent-card .se{font-size:22px;flex-shrink:0;margin-top:2px}
.sent-card .st{font-size:15px}
.sent-card .st .shl{color:#667eea;font-weight:700;background:#eef2ff}
.char-cloud-box{background:#fff;border-radius:20px;padding:16px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.char-cloud-box .cc-chars{font-size:20px;line-height:2.2;letter-spacing:2px}
.char-cloud-box .cc-chars span{display:inline-block;padding:2px 4px;margin:2px;border-radius:6px;transition:all .2s;cursor:pointer}
.char-cloud-box .cc-chars span:hover{background:#667eea;color:#fff;transform:scale(1.15)}
.story-tab-bar{display:flex;gap:8px;margin-bottom:16px}
.story-tab{flex:1;padding:10px;text-align:center;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;border:2px solid transparent}
.story-tab.active{background:#e056a0;color:#fff;box-shadow:0 4px 12px rgba(224,86,160,.3)}
.story-tab:not(.active){background:#fff;color:#e056a0;border-color:#e2e8f0}
.btn-main .ico{font-size:28px}
.btn-main .txt{display:flex;flex-direction:column;align-items:flex-start}
.btn-main .txt small{font-size:12px;font-weight:400;opacity:.8}
.lesson-grid{display:flex;flex-direction:column;gap:10px}
.lesson-card{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:16px;background:#f7fafc;border:2px solid #e2e8f0;cursor:pointer;transition:all .15s}
.lesson-card:active{transform:scale(.98);border-color:#667eea;background:#eef2ff}
.lc-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0}
.lc-info{flex:1;min-width:0}
.lc-name{font-size:15px;font-weight:700;color:#2d3748}
.lc-chars{font-size:12px;color:#a0aec0;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lc-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;flex-shrink:0}
.lc-done{background:#c6f6d5;color:#276749}.lc-part{background:#fefcbf;color:#975a16}.lc-new{background:#e2e8f0;color:#718096}
.lesson-all{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px;border-radius:16px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:17px;font-weight:700;cursor:pointer;margin-bottom:6px;border:none;width:100%}
.lesson-all:active{opacity:.9;transform:scale(.98)}

/* Flashcard */
.card-area{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 16px;overflow-y:auto}
.card-progress{width:100%;max-width:360px;margin-bottom:12px}
.card-bar-bg{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden}
.card-bar-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:3px;transition:width .3s}
.card-progress-text{display:flex;justify-content:space-between;font-size:12px;color:#a0aec0;margin-top:6px}
.card-lesson-name{font-size:13px;color:#a0aec0;margin-bottom:6px}

.flashcard{width:100%;max-width:360px;border-radius:28px;position:relative;user-select:none;transition:transform .2s,box-shadow .2s}
.flashcard:active{transform:scale(.99)}

/* Front */
.flashcard.front{background:linear-gradient(160deg,#fff 0%,#f0f4ff 100%);box-shadow:0 8px 30px rgba(102,126,234,.12);border:3px solid #e2e8f0;padding:30px 20px 24px;display:flex;flex-direction:column;align-items:center}
.fc-char{font-size:130px;font-weight:700;line-height:1.1;color:#2d3748}
.fc-speaker{display:flex;align-items:center;gap:8px;margin-top:16px;padding:10px 24px;border-radius:30px;background:#eef2ff;border:2px solid #c3dafe;cursor:pointer;font-size:16px;color:#667eea;font-weight:600;transition:all .15s}
.fc-speaker:active{transform:scale(.95);background:#c3dafe}
.fc-speaker .wave{display:inline-block;font-size:22px}
.fc-hint-front{font-size:13px;color:#cbd5e0;margin-top:14px}

/* Back */
.flashcard.back{background:linear-gradient(160deg,#667eea,#764ba2);box-shadow:0 8px 30px rgba(102,126,234,.3);border:3px solid transparent;padding:28px 24px 20px;color:#fff}
.fc-back-top{text-align:center;margin-bottom:16px}
.fc-back-char{font-size:72px;font-weight:700;line-height:1.1}
.fc-back-pinyin{font-size:24px;opacity:.85;margin-top:4px;font-weight:500}
.fc-section{background:rgba(255,255,255,.15);border-radius:16px;padding:14px 16px;margin-bottom:10px}
.fc-section-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;opacity:.6;margin-bottom:8px;font-weight:600}
.fc-word-row{display:flex;gap:10px;flex-wrap:wrap}
.fc-word{background:rgba(255,255,255,.2);border-radius:12px;padding:8px 14px;font-size:17px;font-weight:600;cursor:pointer;transition:all .12s;display:flex;flex-direction:column;align-items:center;gap:2px}
.fc-word:active{background:rgba(255,255,255,.35);transform:scale(.95)}
.fc-word small{font-size:11px;font-weight:400;opacity:.7}
.fc-sentence{font-size:15px;line-height:1.6;cursor:pointer;padding:4px 0;transition:opacity .15s}
.fc-sentence:active{opacity:.7}
.fc-sentence small{display:block;font-size:12px;opacity:.6;margin-top:2px}
.fc-play-hint{font-size:11px;opacity:.4;text-align:center;margin-top:6px}

.card-btns{display:flex;gap:14px;margin-top:16px;width:100%;max-width:360px}
.card-btn{flex:1;padding:16px;border-radius:18px;border:none;font-size:18px;font-weight:700;cursor:pointer;transition:transform .12s}
.card-btn:active{transform:scale(.95)}
.btn-no{background:#fed7d7;color:#c53030}
.btn-yes{background:#c6f6d5;color:#276749}
.btn-next{background:#e2e8f0;color:#4a5568;font-size:15px}
.btn-prev{background:#e2e8f0;color:#4a5568;font-size:15px}

/* Result */
.result-icon{font-size:80px;margin-bottom:12px}
.result-title{font-size:26px;font-weight:800;color:#2d3748;margin-bottom:8px}
.result-sub{font-size:16px;color:#718096;margin-bottom:24px}
.result-stats{display:flex;gap:16px;margin-bottom:28px}
.result-stat{text-align:center;padding:16px 24px;border-radius:16px;background:#f7fafc}
.rs-num{font-size:32px;font-weight:800}
.rs-label{font-size:12px;color:#a0aec0;margin-top:2px}
.rs-good{color:#38a169}.rs-bad{color:#e53e3e}
.result-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px}
.result-btn{padding:14px;border-radius:16px;border:none;font-size:16px;font-weight:700;cursor:pointer;transition:transform .12s}
.result-btn:active{transform:scale(.97)}
.rb-retry{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.rb-wrong{background:#fff5f5;color:#e53e3e;border:2px solid #fed7d7}
.rb-home{background:#f7fafc;color:#4a5568;border:2px solid #e2e8f0}

/* Wrong */
.wrong-empty{padding:60px 20px;text-align:center}
.we-icon{font-size:64px;margin-bottom:12px}
.we-text{font-size:16px;color:#a0aec0}
.wrong-list{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding-bottom:20px}
.wrong-chip{display:flex;flex-direction:column;align-items:center;padding:12px 16px;border-radius:16px;background:#fff5f5;border:2px solid #fed7d7;cursor:pointer;transition:all .15s;min-width:80px}
.wrong-chip:active{transform:scale(.95);border-color:#f56565}
.wc-char{font-size:32px;font-weight:700;color:#2d3748}
.wc-py{font-size:12px;color:#e53e3e;margin-top:2px}
.wc-ct{font-size:10px;color:#a0aec0;margin-top:2px}
.wrong-actions{display:flex;gap:10px;margin-top:16px;width:100%}
.wrong-btn{flex:1;padding:14px;border-radius:16px;border:none;font-size:15px;font-weight:700;cursor:pointer}
.wrong-btn:active{transform:scale(.97)}
.wb-practice{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff}
.wb-clear{background:#fff5f5;color:#e53e3e;border:2px solid #fed7d7}

/* ── Card slide feedback ── */
@keyframes slideOutLeft{to{transform:translateX(-120%);opacity:0}}
@keyframes slideOutRight{to{transform:translateX(120%);opacity:0}}
@keyframes slideInRight{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInLeft{from{transform:translateX(-40px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.slide-out-left{animation:slideOutLeft .3s ease forwards;pointer-events:none}
.slide-out-right{animation:slideOutRight .3s ease forwards;pointer-events:none}
.slide-in-right{animation:slideInRight .25s ease}
.slide-in-left{animation:slideInLeft .25s ease}

/* ── Wrong detail modal ── */
.wrong-modal{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.wrong-modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.45)}
.wrong-modal-box{position:relative;background:#fff;border-radius:24px;padding:28px 24px 20px;max-width:340px;width:100%;z-index:1;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.wm-char{text-align:center;font-size:80px;font-weight:700;color:#2d3748;line-height:1.1}
.wm-pinyin{text-align:center;font-size:22px;color:#667eea;margin:4px 0 14px;font-weight:500}
.wm-section{background:#f7fafc;border-radius:14px;padding:12px 14px;margin-bottom:10px}
.wm-label{font-size:11px;color:#a0aec0;font-weight:600;margin-bottom:6px;letter-spacing:1px}
.wm-words{display:flex;gap:8px;flex-wrap:wrap}
.wm-word{background:#eef2ff;border-radius:10px;padding:6px 14px;font-size:16px;font-weight:600;color:#667eea;cursor:pointer;transition:all .12s}
.wm-word:active{background:#c3dafe;transform:scale(.95)}
.wm-sentence{font-size:15px;color:#4a5568;line-height:1.6;cursor:pointer;transition:opacity .15s}
.wm-sentence:active{opacity:.6}
.wm-stroke-wrap{display:flex;align-items:center;gap:12px;background:#f7fafc;border-radius:14px;padding:12px 14px;margin-bottom:10px}
.wm-stroke-box{width:80px;height:80px;background:#fff;border:2px solid #e2e8f0;border-radius:10px;flex-shrink:0;cursor:pointer}
.wm-stroke-box:active{transform:scale(.96)}
.wm-stroke-info{flex:1;display:flex;flex-direction:column;gap:4px;font-size:13px;color:#4a5568}
.wm-btns{display:flex;gap:10px;margin-top:14px}
.wm-btn{flex:1;padding:14px;border-radius:16px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:transform .12s}
.wm-btn:active{transform:scale(.96)}
.wm-btn-del{background:#fff5f5;color:#e53e3e;border:2px solid #fed7d7}
.wm-btn-close{background:#eef2ff;color:#667eea;border:2px solid #c3dafe}
.wm-count{text-align:center;font-size:12px;color:#e53e3e;margin-bottom:12px;font-weight:600}
.speaking .wave{animation:pulse .6s ease infinite}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
/* ── Character list modal ── */
.charlist-modal{position:fixed;inset:0;z-index:1000;display:flex;align-items:flex-end;justify-content:center;padding:0;animation:fadeIn .2s ease}
.charlist-modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.4)}
.charlist-modal-box{position:relative;background:#fff;border-radius:24px 24px 0 0;padding:20px 16px 28px;width:100%;max-width:480px;max-height:75vh;z-index:1;overflow-y:auto;box-shadow:0 -4px 20px rgba(0,0,0,.15)}
.charlist-modal-box::-webkit-scrollbar{width:0;display:none}
.clm-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;position:sticky;top:0;background:#fff;padding-bottom:8px;z-index:1}
.clm-title{font-size:18px;font-weight:800;color:#2d3748}
.clm-count{font-size:13px;color:#a0aec0;font-weight:500}
.clm-close{width:36px;height:36px;border-radius:50%;border:none;background:#f7fafc;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#718096}
.clm-close:active{background:#e2e8f0}
.clm-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-start}
.clm-chip{display:flex;flex-direction:column;align-items:center;padding:8px 10px;border-radius:12px;min-width:56px;cursor:pointer;transition:all .12s;font-size:13px}
.clm-chip:active{transform:scale(.93)}
.clm-chip-learned{background:#c6f6d5;border:1.5px solid #9ae6b4}
.clm-chip-learned .clm-c{font-size:24px;font-weight:700;color:#276749}
.clm-chip-learned .clm-p{font-size:10px;color:#38a169;margin-top:1px}
.clm-chip-new{background:#f7fafc;border:1.5px solid #e2e8f0}
.clm-chip-new .clm-c{font-size:24px;font-weight:700;color:#4a5568}
.clm-chip-new .clm-p{font-size:10px;color:#a0aec0;margin-top:1px}
.clm-chip-wrong{background:#fff5f5;border:1.5px solid #fed7d7}
.clm-chip-wrong .clm-c{font-size:24px;font-weight:700;color:#e53e3e}
.clm-chip-wrong .clm-p{font-size:10px;color:#e53e3e;margin-top:1px}
.clm-empty{text-align:center;padding:40px 0;color:#a0aec0;font-size:15px}

const STORE_KEY='yishu_app_v1';
let state=loadState();
function loadState(){try{const s=JSON.parse(localStorage.getItem(STORE_KEY));if(s&&s.version===2){if(!s.started)s.started={};return s}}catch(e){}return{version:2,wrong:{},learned:{},started:{}}}
function saveState(){localStorage.setItem(STORE_KEY,JSON.stringify(state))}

let sess=null,screen='home',screenStack=[];
let zhVoice=null;

// ── Session persistence (断点续学) ──
const SESS_KEY='yishu_sess_v1';
function saveSess(){try{if(sess)localStorage.setItem(SESS_KEY,JSON.stringify({screen:screen,sess:sess}))}catch(e){}}
function restoreSess(lessonId){try{const d=JSON.parse(localStorage.getItem(SESS_KEY));if(d&&d.sess&&d.sess.lessonId===lessonId&&d.sess.idx<d.sess.chars.length)return d}catch(e){}return null}
function clearSess(){try{localStorage.removeItem(SESS_KEY)}catch(e){}}

// ═══════════════════════════════════════════
// SPEECH
// ═══════════════════════════════════════════
function initVoice(){
  if(!window.speechSynthesis)return;
  const pick=()=>{
    const voices=speechSynthesis.getVoices();
    zhVoice=voices.find(v=>v.lang.startsWith('zh')&&v.localService)||voices.find(v=>v.lang.startsWith('zh'))||null;
  };
  pick();
  speechSynthesis.onvoiceschanged=pick;
}
function speak(text){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='zh-CN';u.rate=0.75;u.pitch=1.1;
  if(zhVoice)u.voice=zhVoice;
  speechSynthesis.speak(u);
  // visual feedback
  const sp=document.querySelector('.fc-speaker,.speaking');
  if(sp){sp.classList.add('speaking');setTimeout(()=>sp.classList.remove('speaking'),600)}
}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function totalChars(){return _dedupChars(LESSONS.flatMap(l=>l.chars)).length}
function learnedCount(){return Object.keys(state.learned).length}
function wrongCount(){return Object.keys(state.wrong).length}
function getWrongChars(){return Object.entries(state.wrong).map(([c,i])=>({char:c,...i})).sort((a,b)=>b.count-a.count)}

function navigate(to,push=true){if(push&&screen!==to)screenStack.push(screen);if(sess&&(screen==='card'||screen==='wrongPractice'||screen==='test'))saveSess();screen=to;render()}
function goBack(){if(screenStack.length){if(sess&&(screen==='card'||screen==='wrongPractice'||screen==='test'))saveSess();screen=screenStack.pop();render()}else navigate('home',false)}

const $=id=>document.getElementById(id);
function render(){
  const back=$('btnBack'),title=$('hdrTitle'),badge=$('hdrBadge'),scr=$('screen');
  back.style.visibility=screen==='home'?'hidden':'visible';
  badge.textContent='';
  // Update user icon
  const userEl=$('hdrUser');
  if(_sbUser){userEl.className='hdr-user hdr-user-on';userEl.textContent=_sbUser.email[0].toUpperCase()}
  else{userEl.className='hdr-user hdr-user-off';userEl.textContent='👤'}
  switch(screen){
    case'home':renderHome(scr,title);break;
    case'lessons':renderLessons(scr,title);break;
    case'textbookLessons':renderTextbookLessons(scr,title);break;
        case'myStories':renderMyStories(scr,title);break;
    case'mathPractice':_renderMathPractice(scr,title);break;
    case'auth':renderAuth(scr,title);break;
    case'card':case'wrongPractice':case'test':renderCard(scr,title);break;
    case'result':case'wrongResult':renderResult(scr,title,badge);break;
    case'wrong':renderWrong(scr,title,badge);break;
    case'testResult':renderTestResult(scr,title,badge);break;
  }
}

  let h=`<button class="lesson-all anim-in" onclick="startAll()">🎯 全部字卡一起练（${totalChars()}字）</button>`;
  for(const[gr,ls]of Object.entries(g)){

function renderCard(el,t){
  if(!sess){navigate('home',false);return}
  const isW=screen==='wrongPractice';
  const isTest=screen==='test';
  t.textContent=isTest?'识字测评':isW?'复习错字':sess.lessonName;
  if(sess.idx>=sess.chars.length){navigate(isTest?'testResult':isW?'wrongResult':'result');return}
  const[ch,py]=sess.chars[sess.idx],pct=((sess.idx)/sess.chars.length*100).toFixed(0);
  const vocab=V[ch];
  const words=vocab?vocab.w:[];
  const sentence=vocab?vocab.s:'';

  const wordsHtml=words.map(w=>`<span class="fc-word" onclick="event.stopPropagation();speak('${w}')">${w}</span>`).join('');
  const sentHtml=sentence?`<div class="fc-sentence" onclick="event.stopPropagation();speak('${sentence}')">${sentence}<small>点我朗读</small></div>`:'';

  // Dynamic stroke/pinyin info from cnchar
  const dynStroke = getStrokeCount(ch);
  const dynRadical = getRadical(ch);
  const strokeInfo = dynStroke ? `<div class="si-row"><span class="si-label">笔画</span><span class="si-val">${dynStroke} 画</span></div>` : '';
  const radicalInfo = dynRadical ? `<div class="si-row"><span class="si-label">部首</span><span class="si-val">${typeof dynRadical==='string'?dynRadical:(dynRadical.radical||'')}</span></div>` : '';
  const strokeAreaHtml = `<div class="fc-stroke-area">
    <div class="fc-stroke-box" id="hw-target" onclick="event.stopPropagation();replayStroke()"></div>
    <div class="fc-stroke-info">
      ${strokeInfo}${radicalInfo}
      <div class="fc-replay-hint">点动画可重播</div>
    </div>
  </div>`;

  // Test mode: simpler card back with stroke animation
  const backContent = isTest ? `
    <div class="flashcard back" id="fc" onclick="flipCard()">
      ${strokeAreaHtml}
      <div class="fc-back-top"><div class="fc-back-char">${ch}</div><div class="fc-back-pinyin">${py}</div></div>
      <div style="text-align:center;margin-top:16px;font-size:15px;opacity:.7">认识这个字吗？</div>
    </div>` : `
    <div class="flashcard back" id="fc" onclick="flipCard()">
      ${strokeAreaHtml}
      <div class="fc-back-top"><div class="fc-back-char">${ch}</div><div class="fc-back-pinyin">${py}</div></div>
      ${words.length?`<div class="fc-section"><div class="fc-section-label">📝 词语</div><div class="fc-word-row">${wordsHtml}</div></div>`:''}
      ${sentHtml?`<div class="fc-section"><div class="fc-section-label">💬 句子</div>${sentHtml}</div>`:''}
      <div class="fc-play-hint">点词语或句子可以听读音</div>
    </div>`;

  el.innerHTML=`<div class="card-area anim-in">
    <div class="card-progress"><div class="card-bar-bg"><div class="card-bar-fill" style="width:${pct}%"></div></div>
    <div class="card-progress-text"><span>第 ${sess.idx+1} / ${sess.chars.length} 个</span><span>✅${sess.correct}  ❌${sess.wrong.length}</span></div></div>
    <div class="card-lesson-name">${isTest?'识字测评 · 随机抽字':isW?'错字复习':sess.lessonName}</div>
    ${sess.showBack?backContent:`
    <div class="flashcard front" id="fc" onclick="flipCard()">
      <div class="fc-char">${ch}</div>
      <div class="fc-speaker" onclick="event.stopPropagation();speak('${ch}')"><span class="wave">🔊</span> 听读音</div>
      <div class="fc-hint-front">${isTest?'认识就点"认识"，不认识点"不会"':'点卡片看拼音和词语'}</div>
    </div>`}
    <div class="card-btns">
      <button class="card-btn btn-no" onclick="markCard(false)">❌ 不会</button>

function startLesson(id){
  const saved=restoreSess(id);
  if(saved){sess=saved.sess;navigate(saved.screen||'card');return}
  const l=LESSONS.find(x=>x.id===id);if(!l)return;
  if(!state.started[id]){state.started[id]=true;saveState()}
  sess={lessonId:id,lessonName:l.name,chars:shuffle(l.chars),idx:0,correct:0,wrong:[],showBack:false};
  navigate('card');
}
function _dedupChars(arr){var seen={};return arr.filter(function(c){if(seen[c[0]])return false;seen[c[0]]=1;return true})}
function startAll(){
  const saved=restoreSess('all');
  if(saved){sess=saved.sess;navigate(saved.screen||'card');return}
  const all=_dedupChars(LESSONS.flatMap(l=>l.chars));
  sess={lessonId:'all',lessonName:'全部字卡',chars:shuffle(all),idx:0,correct:0,wrong:[],showBack:false};
  navigate('card');
}
function startWrongPractice(){
  const saved=restoreSess('wrong');
  if(saved){sess=saved.sess;navigate(saved.screen||'wrongPractice');return}
  const wc=getWrongChars();if(!wc.length)return;
  sess={lessonId:'wrong',lessonName:'错字复习',chars:shuffle(wc.map(w=>[w.char,w.pinyin])),idx:0,correct:0,wrong:[],showBack:false};
  navigate('wrongPractice');
}

function flipCard(){
  sess.showBack=!sess.showBack;
  if(sess.showBack){
    const[ch,py]=sess.chars[sess.idx];
    speak(ch);
  }
  render();
  if(sess.showBack){
    setTimeout(()=>initStroke(sess.chars[sess.idx][0]),120);
  }
}
function markCard(ok){
  const[ch,py]=sess.chars[sess.idx];
  const isTest=screen==='test';

  // Update state
  if(isTest){
    if(ok) sess.correct++;
    else sess.wrong.push([ch,py]);
  } else {
    if(ok){sess.correct++;state.learned[ch]=true;delete state.wrong[ch]}
    else{sess.wrong.push([ch,py]);if(!state.wrong[ch])state.wrong[ch]={pinyin:py,count:0};state.wrong[ch].count++;delete state.learned[ch]}
    saveState();
  }

  // Visual feedback: slide the card out
  const cardEl=document.querySelector('.flashcard');
  if(cardEl){
    cardEl.classList.add(ok?'slide-out-right':'slide-out-left');
  }

  // Delay transition for animation
  setTimeout(()=>{
    sess.idx++;sess.showBack=false;
    if(sess.idx>=sess.chars.length){
      clearSess();
      navigate(isTest?'testResult':screen==='wrongPractice'?'wrongResult':'result');
    } else {
      saveSess();
      render();
      // Slide-in animation for new card
      const newCard=document.querySelector('.flashcard');
      if(newCard) newCard.classList.add('slide-in-right');
    }
  },280);
}

var _mathMode='',_mathProblems=[],_mathIdx=0,_mathCorrect=0,_mathTotal=0,_mathStreak=0;
function _renderMathHome(){
  var h='<div class="home-hero anim-in">';
  h+='<div class="home-emoji">🔢</div><div class="home-title" style="font-size:22px">数学练习场</div>';
  h+='<div class="home-sub">动脑筋 · 算得快</div></div>';
  h+='<div class="home-btns">';
  h+='<button class="btn-main btn-math-add" onclick="_startMath(\'add\')"><span class="ico">➕</span><span class="txt">20以内加法<small>两数相加，结果不超过20</small></span></button>';
  h+='<button class="btn-main btn-math-add" onclick="_startMath(\'sub\')"><span class="ico">➖</span><span class="txt">20以内减法<small>两数相减，被减数不超过20</small></span></button>';
  h+='<button class="btn-main btn-math-mix" onclick="_startMath(\'mix\')"><span class="ico">🔀</span><span class="txt">加减混合<small>加法和减法随机出现</small></span></button>';
  h+='<button class="btn-main btn-math-chain" onclick="_startMath(\'chain\')"><span class="ico">🔗</span><span class="txt">滚法计算<small>连续加减，越滚越大</small></span></button>';
  h+='</div>';
  return h;
}
function _genMathProblem(mode){
  var a,b,op,ans,expr;
  if(mode==='chain'){
    var n1=Math.floor(Math.random()*10)+1;
    var n2=Math.floor(Math.random()*8)+1;
    var n3=Math.floor(Math.random()*6)+1;
    var ops=['+','-'];
    var o1=ops[Math.floor(Math.random()*2)];
    var o2=ops[Math.floor(Math.random()*2)];
    var r=n1;
    r=o1==='+'?r+n1*0+n2:r-n2;
    // ensure positive intermediate results
    if(n1-n2<0){o1='+';r=n1+n2}else{r=n1-n2}
    var mid=r;
    if(mid+n3<=20&&o2==='+'){r=mid+n3}
    else if(mid-n3>=0&&o2==='-'){r=mid-n3}
    else{o2='+';r=mid+n3;if(r>20){n3=20-mid;r=20}}
    if(n3<1)n3=1;
    return{expr:n1+' '+o1+' '+n2+' '+o2+' '+n3,answer:r};
  }
  if(mode==='mix') mode=Math.random()<0.5?'add':'sub';
  if(mode==='add'){
    a=Math.floor(Math.random()*19)+1;
    b=Math.floor(Math.random()*(20-a))+1;
    if(b<1)b=1;
    ans=a+b;if(ans>20){b=20-a;ans=20}
    return{expr:a+' + '+b,answer:ans};
  }
  // sub
  a=Math.floor(Math.random()*19)+2;
  b=Math.floor(Math.random()*a)+1;
  if(b>=a)b=a-1;if(b<1)b=1;
  ans=a-b;
  return{expr:a+' − '+b,answer:ans};
}
function _genOptions(correct){
  var opts=new Set([correct]);
  while(opts.size<4){
    var delta=Math.floor(Math.random()*5)+1;
    var v=Math.random()<0.5?correct+delta:correct-delta;
    if(v>=0&&v<=20&&v!==correct) opts.add(v);
  }
  return shuffle([...opts]);
}
function _startMath(mode){
  _mathMode=mode;_mathProblems=[];_mathIdx=0;_mathCorrect=0;_mathTotal=0;_mathStreak=0;
  for(var i=0;i<20;i++) _mathProblems.push(_genMathProblem(mode));
  navigate('mathPractice');
}
function _renderMathPractice(el,t){
  var modeNames={add:'20以内加法',sub:'20以内减法',mix:'加减混合',chain:'滚法计算'};
  t.textContent=modeNames[_mathMode]||'数学练习';
  if(_mathIdx>=_mathProblems.length){
    // Show result
    var pct=Math.round(_mathCorrect/_mathTotal*100);
    var icon=pct>=90?'🏆':pct>=70?'⭐':pct>=50?'💪':'🌱';
    var msg=pct>=90?'太厉害了！算得又快又准！':pct>=70?'很棒！继续加油！':pct>=50?'不错哦，再练练更好！':'没关系，多练几次就会了！';
    el.innerHTML='<div style="text-align:center;padding:40px 0" class="anim-in">'+
      '<div style="font-size:72px;margin-bottom:16px">'+icon+'</div>'+
      '<div style="font-size:22px;font-weight:800;color:#2d3748;margin-bottom:8px">'+msg+'</div>'+

    return;
  }
  var p=_mathProblems[_mathIdx];
  var opts=_genOptions(p.answer);
  var progress=Math.round(_mathIdx/_mathProblems.length*100);
  var h='<div class="math-score-bar anim-in">'+
    '<div class="ms-item"><div class="ms-num" style="color:#667eea">'+(_mathIdx+1)+'/'+_mathProblems.length+'</div><div class="ms-label">第几题</div></div>'+

  h+='<div style="height:6px;background:#e2e8f0;border-radius:3px;margin-bottom:16px;overflow:hidden"><div style="height:100%;width:'+progress+'%;background:linear-gradient(90deg,#38b2ac,#319795);border-radius:3px;transition:width .3s"></div></div>';

  h+='<div class="mp-expr">'+p.expr+' = <span class="mp-q">?</span></div></div>';
  h+='<div class="math-opts">';
  opts.forEach(function(v){
    h+='<div class="math-opt" onclick="_checkMath(this,'+v+','+p.answer+')">'+v+'</div>';
  });
  h+='</div>';
  el.innerHTML=h;
}
function _checkMath(el,picked,correct){
  if(el.classList.contains('correct')||el.classList.contains('wrong-opt'))return;
  document.querySelectorAll('.math-opt').forEach(function(e){e.style.pointerEvents='none'});
  _mathTotal++;
  if(picked===correct){
    el.classList.add('correct');_mathCorrect++;_mathStreak++;
  } else {
    el.classList.add('wrong-opt');_mathStreak=0;
    document.querySelectorAll('.math-opt').forEach(function(e){
      if(parseInt(e.textContent)===correct) e.classList.add('correct');
    });
  }
  setTimeout(function(){_mathIdx++;render()},600);
}

    if(natures.length&&descs.length) templates.push(function(){var n=_rp(natures),d=_rp(descs);return{t:d+'丽的'+n+'真好看。',c:[n,d]}});
    if(foods.length) templates.push(function(){var f=_rp(foods);return{t:f+'真好吃，我还想再吃！',c:[f]}});
    if(bodies.length&&actions.length) templates.push(function(){var b=_rp(bodies),a=_rp(actions);return{t:'我用'+b+a+'，真能干！',c:[b,a]}});
    if(things.length) templates.push(function(){var th=_rp(things);return{t:'我有一个小'+th+'，我很喜欢它。',c:[th]}});

    var chosen=shuffle(templates).slice(0,Math.min(4,templates.length));
    var text6='奕辰的一天：';
    var usedChars=[];
    chosen.forEach(function(fn){var r=fn();text6+=r.t;usedChars=usedChars.concat(r.c)});
    stories.push({title:'奕辰的一天',emoji:'🌟',color:'s-green',text:text6,chars:usedChars});
  }

  if(stories.length===0) stories.push({title:'加油认字',emoji:'💪',color:'s-blue',text:'再多认几个字，故事就会变多哦！',chars:[]});
  return stories;

// LITERACY TEST (识字测评)

const TEST_SIZE = 30; // number of characters to sample

function startTest(){
  const saved=restoreSess('test');
  if(saved){sess=saved.sess;navigate(saved.screen||'test');return}
  const all = LESSONS.flatMap(l => l.chars);
  const sampled = shuffle(all).slice(0, TEST_SIZE);
  sess = {
    lessonId: 'test', lessonName: '识字测评',
    chars: sampled, idx: 0, correct: 0, wrong: [], showBack: false
  };
  navigate('test');
}

function renderTestResult(el, t, b){
  t.textContent = '测评结果';
  if(!sess){navigate('home',false);return}
  const total = sess.chars.length;
  const good = sess.correct;
  const pct = total ? Math.round(good/total*100) : 0;
  const allCount = totalChars();
  const estimated = Math.round(good / total * allCount);

  // Literacy level for 大班 (5-6 years old)
  let level, icon, desc, color;
  if(estimated <= 30){ level='启蒙期'; icon='🌱'; desc='刚开始认字的小种子，慢慢来！'; color='#a0aec0'; }
  else if(estimated <= 80){ level='成长期'; icon='🌿'; desc='认了不少字，继续加油！'; color='#38b2ac'; }
  else if(estimated <= 140){ level='茂盛期'; icon='🌳'; desc='识字量很棒，快追上小学生了！'; color='#667eea'; }
  else if(estimated <= 200){ level='优秀'; icon='🌻'; desc='识字量优秀，入学准备充分！'; color='#ed8936'; }
  else { level='超棒'; icon='🌟'; desc='识字量超强，小小学霸！'; color='#e53e3e'; }

  // Save test history
  if(!state.testHistory) state.testHistory = [];
  state.testHistory.push({ date: new Date().toISOString().slice(0,10), estimated, good, total, level });
  if(state.testHistory.length > 10) state.testHistory = state.testHistory.slice(-10);
  saveState();

  const wrongList = sess.wrong.map(([c,p])=>`<span style="display:inline-block;margin:3px;padding:5px 12px;background:#fff5f5;border-radius:10px;font-size:16px;font-weight:700;color:#e53e3e">${c}</span>`).join('');

  // History chart data
  const history = state.testHistory || [];
  let historyHtml = '';
  if(history.length > 1){
    const maxVal = Math.max(...history.map(h=>h.estimated), allCount);
    const bars = history.map((h,i) => {
      const barH = Math.max(8, Math.round(h.estimated / maxVal * 120));
      return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <div style="font-size:11px;color:#667eea;font-weight:600">${h.estimated}</div>
        <div style="width:32px;height:${barH}px;background:linear-gradient(180deg,#667eea,#764ba2);border-radius:8px 8px 4px 4px"></div>
        <div style="font-size:10px;color:#a0aec0">${h.date.slice(5)}</div>
      </div>`;
    }).join('');
    historyHtml = `<div style="margin:20px 0;width:100%"><div style="font-size:14px;font-weight:700;color:#2d3748;margin-bottom:12px;text-align:center">📈 测评趋势</div><div style="display:flex;justify-content:center;align-items:flex-end;gap:12px;padding:10px 0">${bars}</div></div>`;
  }

  el.innerHTML = `<div class="screen-center anim-in">
    <div class="result-icon anim-pop" style="font-size:64px">${icon}</div>
    <div style="font-size:14px;color:${color};font-weight:700;margin-bottom:4px;letter-spacing:2px">${level}</div>
    <div class="result-title" style="font-size:42px;margin:8px 0">${estimated}<span style="font-size:18px;color:#a0aec0;font-weight:400"> 字</span></div>
    <div style="font-size:14px;color:#718096;margin-bottom:4px">估算识字量（共 ${allCount} 字）</div>
    <div style="font-size:13px;color:${color};margin-bottom:20px">${desc}</div>

    <div style="display:flex;gap:20px;margin-bottom:16px">
      <div style="text-align:center"><div style="font-size:13px;color:#a0aec0">测试字数</div><div style="font-size:22px;font-weight:700;color:#2d3748">${total}</div></div>
      <div style="text-align:center"><div style="font-size:13px;color:#a0aec0">认识</div><div style="font-size:22px;font-weight:700;color:#38a169">${good}</div></div>
      <div style="text-align:center"><div style="font-size:13px;color:#a0aec0">不会</div><div style="font-size:22px;font-weight:700;color:#e53e3e">${total-good}</div></div>
      <div style="text-align:center"><div style="font-size:13px;color:#a0aec0">正确率</div><div style="font-size:22px;font-weight:700;color:#667eea">${pct}%</div></div>
    </div>

    ${sess.wrong.length ? `<div style="margin-bottom:16px;text-align:center;width:100%"><div style="font-size:13px;color:#a0aec0;margin-bottom:6px">这些字不认识：</div><div style="display:flex;flex-wrap:wrap;justify-content:center;gap:4px">${wrongList}</div></div>` : ''}

    ${historyHtml}

    <div class="result-btns">
      <button class="result-btn rb-retry" style="background:linear-gradient(135deg,#38b2ac,#2d9cdb)" onclick="startTest()">🔄 重新测评</button>

// ── DATA CLEANUP (修复线上脏数据) ──
function cleanupState(){
  let dirty=false;
  // 如果一个字同时在 learned 和 wrong 里，以 learned 为准，从 wrong 中移除
  for(const c in state.wrong){
    if(state.learned[c]){
      delete state.wrong[c];
      dirty=true;
    }
  }
  if(dirty) saveState();
}
cleanupState();

// ── MIGRATION: 旧用户 started 字段迁移 ──
function migrateStarted(){
  if(!state.started) state.started={};
  if(Object.keys(state.started).length===0 && (Object.keys(state.learned).length>0 || Object.keys(state.wrong).length>0)){
    var learnedSet=new Set(Object.keys(state.learned));
    var wrongSet=new Set(Object.keys(state.wrong));
    var known=new Set([...learnedSet,...wrongSet]);
    var MAIN_GROUPS=['识字','课文'];
    // 第一轮：标记主课文（识字/课文）——任意汉字命中即算已开始
    LESSONS.forEach(function(l){
      if(MAIN_GROUPS.indexOf(l.group)!==-1 && l.chars.some(function(c){return known.has(c[0])})){
        state.started[l.id]=true;
      }
    });
    // 收集主课文已覆盖的汉字
    var covered=new Set();
    LESSONS.forEach(function(l){
      if(state.started[l.id] && MAIN_GROUPS.indexOf(l.group)!==-1){
        l.chars.forEach(function(c){covered.add(c[0])});
      }
    });
    // 第二轮：非主课文组——需要强证据才标记已开始
    // 条件：有"不会"的字且不全来自主课文，或本课独有已学字>=3个
    LESSONS.forEach(function(l){
      if(state.started[l.id] || MAIN_GROUPS.indexOf(l.group)!==-1) return;
      var wrongInLesson=l.chars.filter(function(c){return wrongSet.has(c[0])});
      var newWrong=wrongInLesson.filter(function(c){return !covered.has(c[0])});
      var learnedInLesson=l.chars.filter(function(c){return learnedSet.has(c[0])});
      var newLearned=learnedInLesson.filter(function(c){return !covered.has(c[0])});
      if(newWrong.length>0 || newLearned.length>=3){
        state.started[l.id]=true;
      }
    });
    saveState();
  }
}
function cleanupFalseStarted(){
  if(state._migV) return;
  state._migV=1;
  if(!state.started||Object.keys(state.started).length===0){saveState();return}
  var learnedSet=new Set(Object.keys(state.learned));
  var wrongSet=new Set(Object.keys(state.wrong));
  var MAIN_GROUPS=['识字','课文'];
  var covered=new Set();
  LESSONS.forEach(function(l){
    if(state.started[l.id] && MAIN_GROUPS.indexOf(l.group)!==-1)
      l.chars.forEach(function(c){covered.add(c[0])});
  });
  var changed=false;
  LESSONS.forEach(function(l){
    if(!state.started[l.id] || MAIN_GROUPS.indexOf(l.group)!==-1) return;
    var newWrong=l.chars.filter(function(c){return wrongSet.has(c[0])&&!covered.has(c[0])});
    var newLearned=l.chars.filter(function(c){return learnedSet.has(c[0])&&!covered.has(c[0])});
    if(newWrong.length===0 && newLearned.length<3){
      delete state.started[l.id];changed=true;
    }
  });
  if(changed) saveState();
}
cleanupFalseStarted();
migrateStarted();

<script>
// Init cnchar plugins after load
if(typeof cnchar!=='undefined'){
  try{ if(typeof cnchar_order!=='undefined') cnchar.use(cnchar_order); }catch(e){}
}
// Stroke animation handler
let _hw=null;
function initStroke(ch){
  try{
    const el=document.getElementById('hw-target');
    if(!el||typeof HanziWriter==='undefined')return;
    _hw=HanziWriter.create('hw-target',ch,{width:96,height:96,padding:6,showOutline:true,strokeColor:'#333',outlineColor:'#ddd',delayBetweenStrokes:300,strokeAnimationSpeed:1});
    _hw.animateCharacter();
  }catch(e){console.log('HanziWriter init error:',e)}
}
function replayStroke(){
  try{if(_hw)_hw.animateCharacter()}catch(e){}
}
function getStrokeCount(ch){
  try{if(typeof cnchar!=='undefined')return ch.stroke()}catch(e){}
  return null;
}
function getRadical(ch){
  try{if(typeof cnchar!=='undefined'&&cnchar.radical)return cnchar.radical(ch)}catch(e){}
  return null;
}
</script>



<script>

// ═══════════════════════════════════════════
// SUPABASE AUTH & CLOUD SYNC
// ═══════════════════════════════════════════
const SB_URL='https://mbkkipkihvrxavrlrrdi.supabase.co';
const SB_KEY='sb_publishable_vox9Udd7MYaJ6RZC9A9dBw_cgxPNmFh';
let _sb=null, _sbUser=null, _syncTimer=null;

function initSupabase(){
  try{
    if(typeof supabase!=='undefined'){
      _sb=supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true}});
      // Check current session
      _sb.auth.getSession().then(({data:{session}})=>{
        if(session&&session.user){
          _sbUser=session.user;
          updateAuthUI();
          cloudLoad();
        }
        render();
      });
      // Listen for auth changes
      _sb.auth.onAuthStateChange((event,session)=>{
        if(event==='SIGNED_IN'&&session&&session.user){
          _sbUser=session.user;
          updateAuthUI();
          cloudLoad();
        } else if(event==='SIGNED_OUT'){
          _sbUser=null;
          updateAuthUI();
        }
        render();
      });
    }
  }catch(e){console.log('Supabase init error:',e)}
}

function updateAuthUI(){
  const userEl=document.getElementById('hdrUser');
  if(!userEl)return;
  if(_sbUser){userEl.className='hdr-user hdr-user-on';userEl.textContent=_sbUser.email[0].toUpperCase()}
  else{userEl.className='hdr-user hdr-user-off';userEl.textContent='👤'}
}

// ── Auth Actions ──
let _authMode='login';

function renderAuth(el,t){
  t.textContent=_sbUser?'我的账号':'登录 / 注册';
  if(_sbUser){
    el.innerHTML=`<div class="auth-wrap anim-in">
      <div class="auth-info">
        <div class="auth-info-icon">👤</div>
        <div class="auth-info-email">${_sbUser.email}</div>
        <div class="auth-info-sub">数据已同步到云端</div>
      </div>
      <div class="auth-sync-status" id="syncStatus"><span class="dot dot-ok"></span>已同步</div>
      <button class="auth-logout" onclick="doLogout()">退出登录</button>
      <div style="text-align:center;margin-top:16px;font-size:12px;color:#a0aec0">退出后本地数据仍保留</div>
    </div>`;
    return;
  }
  el.innerHTML=`<div class="auth-wrap anim-in">
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:48px">📖</div>
      <div style="font-size:18px;font-weight:700;color:#2d3748;margin-top:4px">登录保存学习进度</div>
      <div style="font-size:13px;color:#718096;margin-top:2px">换设备也能继续学习</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab ${_authMode==='login'?'active':''}" onclick="_authMode='login';render()">登录</button>
      <button class="auth-tab ${_authMode==='register'?'active':''}" onclick="_authMode='register';render()">注册</button>
    </div>
    <input class="auth-field" id="authEmail" type="email" placeholder="邮箱地址" autocomplete="email">
    <input class="auth-field" id="authPass" type="password" placeholder="密码（至少6位）" autocomplete="${_authMode==='login'?'current-password':'new-password'}">
    <button class="auth-submit" id="authBtn" onclick="doAuth()">${_authMode==='login'?'登 录':'注 册'}</button>
    <div class="auth-msg" id="authMsg"></div>
  </div>`;
}

async function doAuth(){
  if(!_sb){showAuthMsg('网络连接失败，请刷新重试','err');return}
  const email=(document.getElementById('authEmail')||{}).value||'';
  const pass=(document.getElementById('authPass')||{}).value||'';
  const btn=document.getElementById('authBtn');
  if(!email||!pass){showAuthMsg('请填写邮箱和密码','err');return}
  if(pass.length<6){showAuthMsg('密码至少6位','err');return}
  btn.disabled=true;btn.textContent='处理中...';
  try{
    if(_authMode==='register'){
      const{data,error}=await _sb.auth.signUp({email,password:pass});
      if(error)throw error;
      showAuthMsg('注册成功！请查收验证邮件','ok');
      if(data.user&&!data.user.confirmed_at){
        showAuthMsg('已发送验证邮件，请检查邮箱','ok');
      }
    } else {
      const{data,error}=await _sb.auth.signInWithPassword({email,password:pass});
      if(error)throw error;
      showAuthMsg('登录成功！','ok');
    }
  }catch(e){
    let msg=e.message||'操作失败';
    if(msg.includes('Invalid login credentials'))msg='邮箱或密码错误';
    else if(msg.includes('Email not confirmed'))msg='请先验证邮箱';
    else if(msg.includes('User already registered'))msg='该邮箱已注册，请直接登录';
    showAuthMsg(msg,'err');
  }
  btn.disabled=false;btn.textContent=_authMode==='login'?'登 录':'注 册';
}

function showAuthMsg(msg,type){
  const el=document.getElementById('authMsg');
  if(el){el.textContent=msg;el.className='auth-msg '+type}
}

async function doLogout(){
  if(!_sb)return;
  if(!confirm('确定退出登录吗？\n本地学习数据仍会保留。'))return;
  await _sb.auth.signOut();
  _sbUser=null;
  updateAuthUI();
  navigate('home',false);
}

// ── Cloud Sync ──
async function cloudSave(){
  if(!_sb||!_sbUser)return;
  const syncEl=document.getElementById('syncStatus');
  if(syncEl)syncEl.innerHTML='<span class="dot dot-syncing"></span>同步中...';
  try{
    const{data:existing}=await _sb.from('user_data').select('data').eq('user_id',_sbUser.id).maybeSingle();
    const merged=existing&&existing.data?{...existing.data}:{};
    merged.yishu=state;
    const payload={user_id:_sbUser.id,data:merged,updated_at:new Date().toISOString()};
    const{error}=await _sb.from('user_data').upsert(payload,{onConflict:'user_id'});
    if(error)throw error;
    if(syncEl)syncEl.innerHTML='<span class="dot dot-ok"></span>已同步 '+new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    console.log('Cloud save error:',e);
    if(syncEl)syncEl.innerHTML='<span class="dot dot-err"></span>同步失败';
  }
}


async function cloudLoad(){
  if(!_sb||!_sbUser)return;
  try{
    const{data:row,error}=await _sb.from('user_data').select('data').eq('user_id',_sbUser.id).maybeSingle();
    if(error)throw error;
    if(!row||!row.data)return;
    const cloud=row.data.yishu;
    if(!cloud)return;
    if(cloud.version===2){
      state.learned=cloud.learned||{};
      state.wrong=cloud.wrong||{};
      state.started=cloud.started||{};
      state.testHistory=cloud.testHistory||[];
      saveState();
      cleanupState();
      migrateStarted();
      render();
    }
  }catch(e){
    console.log('Cloud load error:',e);
  }
}


// Auto-sync: debounce save after state changes
function scheduleCloudSync(){
  if(!_sbUser)return;
  if(_syncTimer)clearTimeout(_syncTimer);
  _syncTimer=setTimeout(cloudSave,2000);
}

// Patch saveState to also trigger cloud sync
const _origSaveState=saveState;
saveState=function(){_origSaveState();scheduleCloudSync()};

// ── INIT SUPABASE ──
initSupabase();

</script>
</body>
</html>
